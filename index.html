<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToneMatch MVP - 本番アップ用</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
  h1 { font-size: 24px; margin-bottom: 5px; }
  p { color: #a0a0a0; font-size: 14px; margin-bottom: 30px; }
  .upload-section { display: flex; gap: 20px; width: 100%; max-width: 600px; margin-bottom: 30px; }
  .upload-box { flex: 1; background-color: #1e1e1e; border: 2px dashed #444; border-radius: 12px; padding: 30px 10px; text-align: center; cursor: pointer; position: relative; overflow: hidden; }
  .upload-box input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
  .thumb-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .thumb-container img, .thumb-container video { width: 100%; height: 100%; object-fit: cover; }
  .btn { background-color: #0A84FF; color: white; border: none; padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; width: 100%; max-width: 600px; transition: background-color 0.2s; }
  .btn:hover { background-color: #0070e0; }
  .btn:disabled { background-color: #444; color: #888; cursor: not-allowed; }
  #preview-section { display: none; width: 100%; max-width: 600px; margin-top: 30px; flex-direction: column; align-items: center; }
  .comparison-slider { position: relative; width: 100%; aspect-ratio: 16 / 9; background-color: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
  .media-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .media-layer img { width: 100%; height: 100%; object-fit: cover; }
  .slider-control { position: absolute; top: 0; left: 0; width: 100%; height: 100%; margin: 0; -webkit-appearance: none; appearance: none; background: transparent; outline: none; z-index: 10; }
  .slider-control::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 40px; height: 1000px; background: transparent; cursor: ew-resize; }
  .slider-line { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background-color: white; box-shadow: 0 0 5px rgba(0,0,0,0.5); z-index: 5; pointer-events: none; }
</style>
</head>
<body>

  <h1>ToneMatch</h1>
  <p>映画の色を、あなたのiPhone動画に。</p>

  <div class="upload-section">
    <div class="upload-box" id="box-ref">
      <div class="placeholder">📁<br>理想の色<br>(画像)</div>
      <input type="file" id="input-ref" accept="image/*">
      <div id="thumb-ref" class="thumb-container"></div>
    </div>
    <div class="upload-box" id="box-target">
      <div class="placeholder">📸/🎥<br>あなたの素材<br>(画像 or 動画)</div>
      <input type="file" id="input-target" accept="image/*,video/*">
      <div id="thumb-target" class="thumb-container"></div>
    </div>
  </div>

  <button id="generate-btn" class="btn" disabled>🎨 AIでカラーマッチング</button>

  <div id="preview-section">
    <h3>プレビュー (スワイプで比較)</h3>
    <div class="comparison-slider">
      <img id="media-before" class="media-layer">
      <img id="media-after" class="media-layer" style="clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);">
      <div class="slider-line" id="slider-line"></div>
      <input type="range" min="0" max="100" value="50" class="slider-control" id="slider">
    </div>
  </div>

<script>
  const inputRef = document.getElementById('input-ref');
  const inputTarget = document.getElementById('input-target');
  const generateBtn = document.getElementById('generate-btn');
  const previewSection = document.getElementById('preview-section');
  const imgBefore = document.getElementById('media-before');
  const imgAfter = document.getElementById('media-after');
  const slider = document.getElementById('slider');
  const sliderLine = document.getElementById('slider-line');

  let hasRef = false; let hasTarget = false;
  let refMediaElement = null;   // 追加：リファレンス画像も要素として保持
  let targetMediaElement = null;

  function handleUpload(input, thumbContainer, isRef) {
    input.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const isVideo = file.type.startsWith('video/');
      
      const mediaEl = isVideo ? document.createElement('video') : document.createElement('img');
      mediaEl.src = url;
      if (isVideo) { mediaEl.autoplay = true; mediaEl.loop = true; mediaEl.muted = true; mediaEl.playsInline = true; }
      
      thumbContainer.innerHTML = '';
      thumbContainer.appendChild(mediaEl);
      
      // 画像・動画要素を変数に保存しておく
      if (isRef) { hasRef = true; refMediaElement = mediaEl; } 
      else { hasTarget = true; targetMediaElement = mediaEl; }
      
      if (hasRef && hasTarget) generateBtn.disabled = false;
    });
  }

  handleUpload(inputRef, document.getElementById('thumb-ref'), true);
  handleUpload(inputTarget, document.getElementById('thumb-target'), false);

  // 🌟追加：ブラウザ側で画像を縮小・軽量化する関数
  async function getResizedBlob(mediaEl) {
    const canvas = document.createElement('canvas');
    const MAX_SIZE = 800; // 最大800pxに縮小
    
    let w = mediaEl.tagName.toLowerCase() === 'video' ? mediaEl.videoWidth : (mediaEl.naturalWidth || mediaEl.width);
    let h = mediaEl.tagName.toLowerCase() === 'video' ? mediaEl.videoHeight : (mediaEl.naturalHeight || mediaEl.height);

    // アスペクト比を保ったまま縮小計算
    if (w > h && w > MAX_SIZE) { h = Math.floor(h * (MAX_SIZE / w)); w = MAX_SIZE; }
    else if (h > MAX_SIZE) { w = Math.floor(w * (MAX_SIZE / h)); h = MAX_SIZE; }

    canvas.width = w;
    canvas.height = h;
    
    // Canvasに描画（ここで画像が圧縮される）
    canvas.getContext('2d').drawImage(mediaEl, 0, 0, w, h);
    
    // 0.8(80%)の画質のJPEGにして返す
    return new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
  }

  generateBtn.addEventListener('click', async () => {
    generateBtn.textContent = '⏳ 軽量化して送信中...';
    generateBtn.disabled = true;

    try {
      // 🌟変更：リファレンスもターゲットも、送信前にブラウザ側でリサイズする！
      const refBlob = await getResizedBlob(refMediaElement);
      const targetBlob = await getResizedBlob(targetMediaElement);
      
      imgBefore.src = URL.createObjectURL(targetBlob);

      const formData = new FormData();
      formData.append('ref', refBlob, 'ref.jpg');
      formData.append('target', targetBlob, 'target.jpg');

      const response = await fetch('/api/preview', {
        method: 'POST',
        body: formData
      });

      if (!response.ok) throw new Error('サーバーエラー');

      const resultBlob = await response.blob();
      imgAfter.src = URL.createObjectURL(resultBlob);

      previewSection.style.display = 'flex';
      generateBtn.textContent = '✅ 解析完了！';
      generateBtn.style.backgroundColor = '#34C759';

    } catch (error) {
      console.error(error);
      alert('エラーが発生しました。ログを確認してください。');
      generateBtn.textContent = '🎨 AIでカラーマッチング';
      generateBtn.disabled = false;
    }
  });

  slider.addEventListener('input', (e) => {
    const value = e.target.value;
    imgAfter.style.clipPath = `polygon(0 0, ${value}% 0, ${value}% 100%, 0 100%)`;
    sliderLine.style.left = `${value}%`;
  });
</script>

</body>
</html>
